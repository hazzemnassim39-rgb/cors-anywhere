<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASSIM HOST - تسجيل الدخول</title>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@300;400;500;700;800&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Tajawal', 'Rajdhani', sans-serif;
            background: #03050b;
            color: #eef2ff;
            direction: rtl;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة (مدمجة من التصميمين) */
        .bg-aurora {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 30%, rgba(45,122,255,0.18), transparent 65%),
                        radial-gradient(ellipse at 85% 70%, rgba(0,229,255,0.12), transparent 60%),
                        radial-gradient(ellipse at 60% 90%, rgba(0,200,255,0.1), transparent 55%);
            z-index: -2;
            animation: auroraShift 12s ease-in-out infinite alternate;
        }
        @keyframes auroraShift {
            from { opacity: 0.8; }
            to { opacity: 1; filter: hue-rotate(20deg); }
        }
        
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 200, 255, 0.5);
            border-radius: 50%;
            animation: float linear infinite;
            box-shadow: 0 0 8px rgba(0, 200, 255, 0.4);
        }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
        }

        /* حاوية تسجيل الدخول */
        .login-wrap {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(10, 14, 30, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(45, 122, 255, 0.3);
            border-radius: 32px;
            padding: 40px 36px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(45,122,255,0.1) inset;
        }

        /* الشعار */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, #0f172a, #0d1526);
            border: 1.5px solid rgba(0, 229, 255, 0.5);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #00e5ff;
            margin: 0 auto 16px;
            box-shadow: 0 0 24px rgba(0, 229, 255, 0.25), 0 0 60px rgba(45, 122, 255, 0.15);
        }
        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #2d7aff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Orbitron', sans-serif;
        }
        .brand-sub {
            font-size: 0.8rem;
            color: #6b7aaa;
            margin-top: 6px;
        }

        /* رسالة ترحيب */
        .info-box {
            background: rgba(0, 229, 255, 0.07);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 0.8rem;
            color: #9ca3cf;
            text-align: center;
        }

        /* حقول الإدخال */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: #b0e0ff;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .input-icon-wrap {
            position: relative;
        }
        .form-input {
            width: 100%;
            padding: 14px 18px;
            padding-right: 46px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(0, 200, 255, 0.25);
            border-radius: 14px;
            color: #eef2ff;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: #00ccff;
            background: rgba(0, 200, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(0, 200, 255, 0.12);
        }
        .form-input::placeholder {
            color: #4b556b;
        }
        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ccff;
            font-size: 1rem;
        }

        /* الكابتشا */
        .captcha-box {
            background: rgba(15, 30, 35, 0.4);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .captcha-question {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00ccff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* زر الدخول */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ccff, #0099ff);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(0, 200, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0, 200, 255, 0.55);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* التنبيهات */
        .alert {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .alert.error {
            background: rgba(255, 61, 90, 0.1);
            border: 1px solid rgba(255, 61, 90, 0.3);
            color: #ff7a94;
        }
        .alert.success {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }
        .alert.show {
            display: flex;
            animation: alertIn 0.3s ease;
        }
        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* سبينر */
        .spinner-sm {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* تذييل */
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: #6b7aaa;
        }
        .footer-note a {
            color: #2d7aff;
            text-decoration: none;
            font-weight: 600;
        }
        .tg-link {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(0, 136, 204, 0.12);
            border: 1px solid rgba(0, 136, 204, 0.3);
            border-radius: 30px;
            color: #29b5e8;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.2s;
        }
        .tg-link:hover {
            background: rgba(0, 136, 204, 0.2);
            border-color: #29b5e8;
        }

        /* تحسينات الجوال */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .brand-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-aurora"></div>
<div class="particles" id="particles"></div>

<div class="login-wrap">
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-crown"></i></div>
            <div class="brand-name">NASSIM HOST</div>
            <div class="brand-sub">لوحة التحكم الآمنة</div>
        </div>

        <div class="alert" id="alertBox">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMsg"></span>
        </div>

        <div class="info-box">
            <i class="fas fa-shield-alt"></i> قم بتسجيل الدخول للوصول إلى لوحة التحكم
        </div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> اسم المستخدم</label>
                <div class="input-icon-wrap">
                    <input type="text" class="form-input" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-icon-wrap">
                    <input type="password" class="form-input" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>

            <!-- كابتشا بسيطة -->
            <div class="captcha-box">
                <div class="captcha-question">
                    <i class="fas fa-shield-alt"></i>
                    <span id="captchaQuestion">7 + 4 = ?</span>
                </div>
                <div class="input-icon-wrap">
                    <input type="text" class="form-input" id="captchaInput" placeholder="أدخل الناتج" required>
                    <i class="fas fa-calculator input-icon"></i>
                </div>
                <input type="hidden" id="captchaResult">
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">
                <span id="btnText"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</span>
                <div class="spinner-sm" id="btnSpinner"></div>
            </button>
        </form>

        <div class="footer-note">
            <i class="fas fa-headset"></i> للدعم الفني تواصل عبر
            <br>
            <a href="https://t.me/NASSIM_D5X" target="_blank" class="tg-link">
                <i class="fab fa-telegram-plane"></i> @NASSIM_D5X
            </a>
            <div style="margin-top: 16px;">🛡️ NASSIM HOST v3.0</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // توليد الجسيمات
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (6 + Math.random() * 12) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (1 + Math.random() * 2.5) + 'px';
            p.style.opacity = 0.3 + Math.random() * 0.7;
            container.appendChild(p);
        }

        // إعدادات الكابتشا
        let captchaAnswer = 0;
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            captchaAnswer = num1 + num2;
            document.getElementById('captchaQuestion').innerHTML = `<i class="fas fa-shield-alt"></i> ${num1} + ${num2} = ?`;
            document.getElementById('captchaResult').value = captchaAnswer;
        }

        const alertBox = document.getElementById('alertBox');
        const alertMsg = document.getElementById('alertMsg');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        function showAlert(msg, type = 'error') {
            alertBox.className = `alert ${type} show`;
            alertMsg.textContent = msg;
            const icon = alertBox.querySelector('i');
            icon.className = `fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
        }
        function hideAlert() {
            alertBox.className = 'alert';
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
        }

        // محاكاة API (استبدلها بالاتصال الحقيقي)
        async function fakeApiLogin(username, password) {
            await new Promise(resolve => setTimeout(resolve, 800));
            // بيانات الدخول الافتراضية
            if (username === 'NASSIM' && password === 'D5X2024') {
                return { success: true, redirect: '/dashboard' };
            } else {
                return { success: false, message: 'اسم المستخدم أو كلمة المرور غير صحيحة' };
            }
        }

        async function handleLogin() {
            hideAlert();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const captchaInput = document.getElementById('captchaInput').value.trim();
            const correctCaptcha = parseInt(document.getElementById('captchaResult').value);

            if (!username || !password) {
                showAlert('⚠️ الرجاء إدخال اسم المستخدم وكلمة المرور');
                return;
            }
            if (!captchaInput) {
                showAlert('⚠️ الرجاء إدخال ناتج الكابتشا');
                return;
            }
            if (parseInt(captchaInput) !== correctCaptcha) {
                showAlert('❌ ناتج الكابتشا غير صحيح');
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }

            setLoading(true);
            try {
                // استبدل هذا بـ fetch('/api/login', { method:'POST', body: JSON.stringify({username, password}) })
                const response = await fakeApiLogin(username, password);
                
                if (response.success) {
                    showAlert('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = response.redirect || '/dashboard';
                    }, 1000);
                } else {
                    showAlert(response.message || '❌ فشل تسجيل الدخول', 'error');
                    generateCaptcha();
                    document.getElementById('captchaInput').value = '';
                }
            } catch (error) {
                showAlert('⚠️ خطأ في الاتصال بالخادم', 'error');
                generateCaptcha();
            } finally {
                setLoading(false);
            }
        }

        // ربط الأحداث
        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            handleLogin();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !loginBtn.disabled) {
                handleLogin();
            }
        });

        // بدء الكابتشا
        generateCaptcha();

        // التحقق من الجلسة الحالية
        fetch('/api/current_user')
            .then(r => r.json())
            .then(d => {
                if (d.success) window.location.href = d.is_admin ? '/admin' : '/dashboard';
            })
            .catch(() => {});
    })();
</script>
</body>
    </html>
